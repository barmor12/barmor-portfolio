server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # --- Performance ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/font-woff application/font-woff2 font/ttf;

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # --- Health check endpoint (used by Docker + monitoring) ---
    location = /healthz {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    # --- CV (served as resume.html) ---
    location = /cv  { try_files /resume.html =404; }
    location = /cv/ { try_files /resume.html =404; }

    # --- Long cache for static assets (fonts) ---
    location /fonts/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Long cache for CSS and JS ---
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- HTML: always revalidate ---
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
